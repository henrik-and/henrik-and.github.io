<!DOCTYPE html>
<html>
<head>
    <title>GUM Sequential Tests</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>getUserMedia Sequential Tests</h1>
    <div id="device-selection-container">
        <h3>Select Audio Input Devices to Test:</h3>
        <div id="device-checkboxes">
            Loading devices...
        </div>
        <button id="refresh-devices-btn">Refresh Devices</button>
    </div>

    <div id="options-container" style="margin-bottom: 15px; user-select: none;">
        <input type="checkbox" id="verbose-logs-cb" checked>
        <label for="verbose-logs-cb" style="font-weight: bold; cursor: pointer;">Show detailed logs</label>
    </div>

    <button id="run-tests-btn">Run Tests</button>
    <div id="test-results" class="test-suite">
        <!-- Results will be inserted here -->
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
