<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>getUserMedia Sequential Audio Tests</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1><a href="https://developer.mozilla.org/en-US/docs/Web/API/MediaDevices/getUserMedia" target="_blank" style="color: #1a73e8; text-decoration: none;">getUserMedia</a> Sequential Audio Tests</h1>
    <div id="system-info-container">
        <h3>System Diagnostics</h3>
        <div id="system-info-details">
            Loading diagnostics...
        </div>
    </div>

    <div id="device-selection-container">
        <h3>Select Audio Input Devices to Test:</h3>
        <div id="device-checkboxes">
            Loading devices...
        </div>
        <button id="refresh-devices-btn">Refresh Devices</button>
    </div>

    <div id="test-groups-container" style="margin-bottom: 20px; user-select: none;">
        <h3 style="margin-bottom: 5px;">Select Test Groups to Run:</h3>
        <div id="group-checkboxes" style="display: flex; flex-wrap: wrap; gap: 15px; margin-top: 5px;">
            Loading test groups...
        </div>
    </div>

    <div id="options-container" style="margin-bottom: 15px; user-select: none;">
        <input type="checkbox" id="verbose-logs-cb" checked>
        <label for="verbose-logs-cb" style="font-weight: bold; cursor: pointer; margin-right: 15px;">Show detailed logs</label>
    </div>

    <div style="margin-bottom: 20px; display: flex; align-items: center;">
        <button id="run-tests-btn">Run Tests</button>
        <button id="download-report-btn" style="display: none;">📥 Download Report</button>
    </div>
    
    <div id="progress-container">
        <div id="progress-bar"></div>
    </div>

    <div id="test-results" class="test-suite">
        <!-- Results will be inserted here -->
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
